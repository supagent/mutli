version: 2

project_name: multica

builds:
  - id: multica
    main: ./cmd/multica
    dir: server
    binary: multica
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: multica
    repository:
      owner: supagent
      name: homebrew-multi-cli
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/supagent/mutli"
    description: "Multica CLI — local agent runtime and management tool for the Multica platform"
    license: "Apache-2.0"
    install: |
      bin.install "multica"
    test: |
      system "#{bin}/multica", "version"
    download_strategy: GitHubCliDownloadStrategy
    custom_require: "../Library/github_cli_download_strategy"
